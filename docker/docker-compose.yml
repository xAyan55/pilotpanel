version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pilotpanel-db
    restart: always
    environment:
      POSTGRES_USER: pilotpanel
      POSTGRES_PASSWORD: secret_db_password_123
      POSTGRES_DB: pilotpanel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pilotpanel-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pilotpanel.io
      PGADMIN_DEFAULT_PASSWORD: admin_password_123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
